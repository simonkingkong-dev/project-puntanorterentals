# Firebase App Hosting - Secretos desde Google Cloud Secret Manager
# Los valores están en Secret Manager; aquí solo se referencian por nombre.

env:
  # Stripe (publishable es pública pero suele estar en Secret Manager también)
  - variable: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
    secret: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
    availability:
      - BUILD
      - RUNTIME

  # Google Maps (public browser key + Map ID needed at build time for Next client bundle)
  - variable: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
    secret: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID
    secret: NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET
    availability:
      - RUNTIME

  # Firebase Admin SDK (RUNTIME only to avoid leaking keys into build/CI)
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    secret: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    availability:
    - BUILD
    - RUNTIME
  - variable: FIREBASE_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL
    availability:
      - RUNTIME
  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
    availability:
      - RUNTIME

  # Admin dashboard
  - variable: ADMIN_USERNAME
    secret: ADMIN_USERNAME
    availability:
      - RUNTIME
  - variable: ADMIN_PASSWORD
    secret: ADMIN_PASSWORD
    availability:
      - RUNTIME

  # Hostfully PMS
  - variable: HOSTFULLY_API_KEY
    secret: HOSTFULLY_API_KEY
    availability:
      - RUNTIME
  - variable: HOSTFULLY_AGENCY_UID
    secret: HOSTFULLY_AGENCY_UID
    availability:
      - RUNTIME
  - variable: HOSTFULLY_BASE_URL
    secret: HOSTFULLY_BASE_URL
    availability:
      - RUNTIME
  - variable: HOSTFULLY_ENABLE_WRITES
    secret: HOSTFULLY_ENABLE_WRITES
    availability:
      - RUNTIME

  # Email (SMTP)
  - variable: SMTP_HOST
    secret: SMTP_HOST
    availability:
      - RUNTIME
  - variable: SMTP_PORT
    secret: SMTP_PORT
    availability:
      - RUNTIME
  - variable: SMTP_USER
    secret: SMTP_USER
    availability:
      - RUNTIME
  - variable: SMTP_PASS
    secret: SMTP_PASS
    availability:
      - RUNTIME
