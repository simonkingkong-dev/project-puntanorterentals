<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Logo Preview - Punta Norte Rentals</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 40px; }
    h1 { color: #333; }
    h2 { color: #FF8C42; margin-top: 40px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
    .card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
    .card img { width: 100%; border-radius: 8px; border: 1px solid #eee; }
    .card p { margin: 8px 0 0; font-size: 14px; color: #666; }
    .og-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Punta Norte Rentals — Logo Variations</h1>

  <h2>Favicon / Icon (1:1)</h2>
  <div class="grid">
    <div class="card"><img src="favicon-01.png"><p>#1</p></div>
    <div class="card"><img src="favicon-02.png"><p>#2</p></div>
    <div class="card"><img src="favicon-03.png"><p>#3</p></div>
    <div class="card"><img src="favicon-04.png"><p>#4</p></div>
    <div class="card"><img src="favicon-05.png"><p>#5</p></div>
    <div class="card"><img src="favicon-06.png"><p>#6</p></div>
  </div>

  <h2>OG Image / Social (16:9)</h2>
  <div class="og-grid">
    <div class="card"><img src="og-01.png"><p>#1</p></div>
    <div class="card"><img src="og-02.png"><p>#2</p></div>
    <div class="card"><img src="og-03.png"><p>#3</p></div>
    <div class="card"><img src="og-04.png"><p>#4</p></div>
  </div>

  <h2>Finales seleccionados</h2>
  <div class="og-grid">
    <div class="card" style="border: 3px solid #FF8C42;"><img src="og-04.png"><p>OG Image #4 — Redes sociales</p></div>
  </div>
  <div class="grid" style="margin-top:20px">
    <div class="card" style="border: 3px solid #FF8C42;"><img src="favicon-03.png"><p>#3 — Pestaña del navegador</p></div>
    <div class="card" style="border: 3px solid #FF8C42;"><img src="favicon-06-fixed.png"><p>#6 corregido — Logo frontend</p></div>
  </div>
</body>
</html>
