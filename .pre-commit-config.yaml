# Pre-commit hooks: https://pre-commit.com
# ggshield: escaneo de secretos (API keys, contraseñas, etc.)
# Requiere: Python 3.8+ | Setup: npm run setup:pre-commit

repos:
  - repo: https://github.com/gitguardian/ggshield
    rev: v1.47.0
    hooks:
      - id: ggshield
        language_version: python3
        stages: [pre-commit]
