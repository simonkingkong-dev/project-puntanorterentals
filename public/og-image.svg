<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Clean white background -->
  <rect width="1200" height="630" fill="#FFFFFF"/>

  <!-- Left orange accent stripe -->
  <rect x="0" y="0" width="12" height="630" fill="#FF8C42"/>

  <!-- House icon - top left, clean solid silhouette -->
  <g transform="translate(100, 160)">
    <!-- House body -->
    <path d="M 70 0 L 140 52 L 126 52 L 126 140 L 14 140 L 14 52 L 0 52 Z" fill="#FF8C42"/>
    <!-- Door -->
    <rect x="55" y="90" width="30" height="50" fill="white"/>
  </g>

  <!-- Left palm -->
  <g transform="translate(80, 300)">
    <line x1="0" y1="0" x2="3" y2="-55" stroke="#FF8C42" stroke-width="5" stroke-linecap="round"/>
    <path d="M 3 -55 Q -18 -66 -28 -78" stroke="#FF8C42" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M 3 -55 Q 0 -70 3 -82" stroke="#FF8C42" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M 3 -55 Q 22 -66 30 -78" stroke="#FF8C42" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Right palm (beside house) -->
  <g transform="translate(258, 300)">
    <line x1="0" y1="0" x2="-3" y2="-55" stroke="#FF8C42" stroke-width="5" stroke-linecap="round"/>
    <path d="M -3 -55 Q -22 -66 -30 -78" stroke="#FF8C42" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M -3 -55 Q 0 -70 -3 -82" stroke="#FF8C42" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M -3 -55 Q 18 -66 28 -78" stroke="#FF8C42" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Vertical divider -->
  <line x1="320" y1="140" x2="320" y2="490" stroke="#EEEEEE" stroke-width="1"/>

  <!-- Brand text -->
  <text x="380" y="270" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-weight="700" fill="#1A1A1A" letter-spacing="-2">Punta Norte</text>

  <text x="385" y="355" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="400" fill="#FF8C42" letter-spacing="2">RENTALS</text>

  <!-- Tagline -->
  <text x="385" y="430" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="300" fill="#999999" letter-spacing="3">PROPIEDADES VACACIONALES</text>

  <!-- Bottom orange line -->
  <rect x="0" y="620" width="1200" height="10" fill="#FF8C42"/>
</svg>